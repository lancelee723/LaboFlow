# ─────────────────────────────────────────────────────────────
# Labo-Flow — NGINX reverse proxy (Docker production mode)
#
# Used by the docker-nginx container (mounted at /etc/nginx/nginx.conf).
# Upstreams use Docker service names instead of 127.0.0.1 ports.
#
# Service → container internal port:
#   clawith-frontend  :3000   (nginx serving React build)
#   clawith-backend   :8000   (uvicorn FastAPI)
#   ragflow-cpu       :80     (ragflow embedded nginx)
#   aippt             :80     (nginx serving Vue build)
# ─────────────────────────────────────────────────────────────

worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log  /var/log/nginx/access.log;
    sendfile        on;
    keepalive_timeout  65;

    # Proxy timeouts — LLM calls and streaming can be slow
    proxy_connect_timeout 60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Client upload size (knowledge base uploads)
    client_max_body_size 500M;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstreams (Docker service names) ────────────────────
    upstream clawith_frontend { server clawith-frontend:3000; }
    upstream clawith_backend  { server clawith-backend:8000; }
    upstream ragflow          { server ragflow-cpu:80; }
    upstream aippt            { server aippt:80; }

    server {
        listen 80;
        server_name  localhost;

        location = /healthz {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # ── Clawith backend API ─────────────────────────────
        location /api/ {
            proxy_pass http://clawith_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Clawith backend WebSocket ───────────────────────
        location /ws {
            proxy_pass http://clawith_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_read_timeout 86400;
        }

        # ── RAGFlow (/kb/* → ragflow-cpu root) ──────────────
        # Strips /kb/ prefix before forwarding. Full SPA requires
        # RAGFlow to be configured with RAGFLOW_BASE_PATH=/kb;
        # SSO and API routes work as-is.
        location /kb/ {
            rewrite ^/kb/(.*)$ /$1 break;
            proxy_pass http://ragflow;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
        location = /kb {
            return 301 /kb/;
        }

        # Backward compatibility: redirect old /rag entry to /kb
        location = /rag {
            return 301 /kb/;
        }
        location /rag/ {
            rewrite ^/rag/(.*)$ /kb/$1 permanent;
        }

        # ── AIPPT API proxy → Clawith backend ──────────────
        location /ppt/api/ {
            rewrite ^/ppt/api/(.*)$ /api/$1 break;
            proxy_pass http://clawith_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── AIPPT (/ppt → aippt:80) ─────────────────────────
        location /ppt/ {
            proxy_pass http://aippt;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
        location = /ppt {
            return 301 /ppt/;
        }

        # ── Clawith frontend (root + SPA fallback) ──────────
        location / {
            proxy_pass http://clawith_frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
