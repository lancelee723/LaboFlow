# ─────────────────────────────────────────────────────────────
# Labo-Flow — NGINX reverse proxy (dev mode)
#
# Unified entry on port 3008:
#   /        → Clawith frontend (Vite dev server on 3080)
#   /api     → Clawith backend (FastAPI on 8008)
#   /ws      → Clawith backend WebSocket
#   /rag/    → RAGFlow (Docker service on 8880)
#   /ppt/    → AIPPT (Vite dev server on 5173)
#
# Run with:  nginx -p $PWD -c nginx.conf -g 'daemon off;'
# ─────────────────────────────────────────────────────────────

worker_processes  1;
error_log  .data/log/nginx-error.log warn;
pid        .data/pid/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # Try Homebrew path first, fallback to system path
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log  .data/log/nginx-access.log;
    sendfile        on;
    keepalive_timeout  65;

    # Proxy timeouts — LLM calls and streaming can be slow
    proxy_connect_timeout 60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Client upload size (knowledge base uploads)
    client_max_body_size 500M;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstreams ───────────────────────────────────────────
    upstream clawith_frontend { server 127.0.0.1:3080; }
    upstream clawith_backend  { server 127.0.0.1:8008; }
    upstream ragflow           { server 127.0.0.1:8880; }
    upstream aippt            { server 127.0.0.1:5173; }

    server {
        listen 3008;
        server_name  localhost;

        # ── Clawith backend API ─────────────────────────────
        location /api/ {
            proxy_pass http://clawith_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Clawith backend WebSocket ───────────────────────
        location /ws {
            proxy_pass http://clawith_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_read_timeout 86400;
        }

        # ── RAGFlow (/rag/ → 8880) ──────────────────────────
        location /rag/ {
            proxy_pass http://ragflow;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /rag;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
        location = /rag {
            return 301 /rag/;
        }

        # ── AIPPT API proxy → Clawith backend ──────────────
        # AIPPT has no standalone backend; all API calls (auth,
        # presentations, etc.) are proxied to Clawith which provides
        # SSO verification and presentation CRUD.
        location /ppt/api/ {
            rewrite ^/ppt/api/(.*)$ /api/$1 break;
            proxy_pass http://clawith_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── AIPPT (/ppt → 5173) ─────────────────────────────
        # AIPPT is a Vite SPA with base=/ppt/ (set via VITE_BASE in
        # dev.sh). Do NOT strip the /ppt/ prefix — Vite would 302
        # back to /ppt/ on any non-prefixed request, causing a loop.
        # In dev mode Vite serves HMR over WebSocket — upgrade headers required.
        location /ppt/ {
            proxy_pass http://aippt;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /ppt;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
        location = /ppt {
            return 301 /ppt/;
        }

        # ── Clawith frontend (root + SPA fallback) ──────────
        location / {
            proxy_pass http://clawith_frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
