# ─────────────────────────────────────────────────────────────
# Labo-Flow — NGINX reverse proxy (dev mode)
#
# Unified entry on port 3008:
#   /        → Clawith frontend (Vite dev server on 3080)
#   /api     → Clawith backend (FastAPI on 8008)
#   /ws      → Clawith backend WebSocket
#   /kb/     → RAGFlow (Docker service on 8880)
#   /ppt/    → AIPPT (Vite dev server on 5173)
#
# Run with:  nginx -p $PWD -c nginx.conf -g 'daemon off;'
# ─────────────────────────────────────────────────────────────

worker_processes  1;
error_log  .data/log/nginx-error.log warn;
pid        .data/pid/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # Try Homebrew path first, fallback to system path
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log  .data/log/nginx-access.log;
    sendfile        on;
    keepalive_timeout  65;

    # Proxy timeouts — LLM calls and streaming can be slow
    proxy_connect_timeout 60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Client upload size (knowledge base uploads)
    client_max_body_size 500M;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstreams ───────────────────────────────────────────
    upstream clawith_frontend { server 127.0.0.1:3080; }
    upstream clawith_backend  { server 127.0.0.1:8008; }
    upstream ragflow           { server 127.0.0.1:8880; }
    upstream aippt            { server 127.0.0.1:5173; }

    server {
        listen 3008;
        server_name  localhost;

        # ── RAGFlow API (must come before /api/ to win prefix match) ──
        # RAGFlow frontend makes absolute-path calls to /api/v1/... and /v1/...
        # without the /kb/ prefix. Clawith uses /api/<resource> (no /v1/ segment),
        # so these blocks are safe and non-overlapping.
        location /api/v1/ {
            proxy_pass http://ragflow;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
        location /v1/ {
            proxy_pass http://ragflow;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }

        # ── Clawith backend API ─────────────────────────────
        location /api/ {
            proxy_pass http://clawith_backend;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $http_host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Clawith backend WebSocket ───────────────────────
        location /ws {
            proxy_pass http://clawith_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_read_timeout 86400;
        }

        # ── RAGFlow API through /kb/ path ──────────────────
        # Vite dev server has base=/kb/ but its proxy patterns
        # only match /api and /v1 (without /kb/ prefix).  These
        # blocks strip /kb/ so Vite's proxy can route correctly.
        location /kb/api/ {
            proxy_pass http://ragflow/api/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
        location /kb/v1/ {
            proxy_pass http://ragflow/v1/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }

        # ── RAGFlow UI (/kb/* → ragflow as-is) ─────────────
        # Forward /kb/ requests to Vite without stripping the
        # prefix — Vite's base=/kb/ handles static assets and
        # SPA routing natively.
        location /kb/ {
            proxy_pass http://ragflow;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
        location = /kb {
            return 301 /kb/;
        }

        # Backward compatibility: redirect old /rag entry to /kb
        location = /rag {
            return 301 /kb/;
        }
        location /rag/ {
            rewrite ^/rag/(.*)$ /kb/$1 permanent;
        }

        # ── AIPPT API proxy → Clawith backend ──────────────
        # AIPPT has no standalone backend; all API calls (auth,
        # presentations, etc.) are proxied to Clawith which provides
        # SSO verification and presentation CRUD.
        location /ppt/api/ {
            rewrite ^/ppt/api/(.*)$ /api/$1 break;
            proxy_pass http://clawith_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── AIPPT (/ppt → 5173) ─────────────────────────────
        # AIPPT is a Vite SPA with base=/ppt/ (set via VITE_BASE in
        # dev.sh). Do NOT strip the /ppt/ prefix — Vite would 302
        # back to /ppt/ on any non-prefixed request, causing a loop.
        # In dev mode Vite serves HMR over WebSocket — upgrade headers required.
        location /ppt/ {
            proxy_pass http://aippt;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /ppt;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
        location = /ppt {
            return 301 /ppt/;
        }

        # ── Clawith frontend (root + SPA fallback) ──────────
        location / {
            proxy_pass http://clawith_frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
