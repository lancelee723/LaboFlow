include:
  # RAGFlow and its dependencies (MySQL, Elasticsearch, MinIO, Redis)
  # Variable substitution uses ragflow/docker/.env
  - path: ragflow/docker/docker-compose.yml
    env_file: ragflow/docker/.env

services:
  postgres:
    image: postgres:15.12-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clawith}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clawith}
      POSTGRES_DB: ${POSTGRES_DB:-clawith}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clawith}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - laboflow

  clawith-redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - laboflow

  clawith-backend:
    image: ${REGISTRY:-crpi-oxztsn6qggvtnlnf.cn-guangzhou.personal.cr.aliyuncs.com/laboflow}/docker-clawith-backend:${TAG:-latest}
    restart: unless-stopped
    dns:
      - 223.5.5.5
      - 114.114.114.114
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clawith}:${POSTGRES_PASSWORD:-clawith}@postgres:5432/${POSTGRES_DB:-clawith}
      REDIS_URL: redis://clawith-redis:6379/0
      AGENT_DATA_DIR: /data/agents
      AGENT_TEMPLATE_DIR: /app/agent_template
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CORS_ORIGINS: '["*"]'
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3008}
      RAGFLOW_URL: ${RAGFLOW_URL:-/kb}
      DOCKER_NETWORK: laboflow
      RAGFLOW_MCP_URL: http://nginx/internal/mcp
    volumes:
      - agent_data:/data/agents
    depends_on:
      postgres:
        condition: service_healthy
      clawith-redis:
        condition: service_healthy
    networks:
      laboflow:
        aliases:
          - backend

  clawith-frontend:
    image: ${REGISTRY:-crpi-oxztsn6qggvtnlnf.cn-guangzhou.personal.cr.aliyuncs.com/laboflow}/docker-clawith-frontend:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - clawith-backend
    networks:
      - laboflow

  aippt:
    # Private aippt image currently publishes amd64 manifest only.
    platform: ${AIPPT_PLATFORM:-linux/amd64}
    image: ${REGISTRY:-crpi-oxztsn6qggvtnlnf.cn-guangzhou.personal.cr.aliyuncs.com/laboflow}/docker-aippt:${TAG:-latest}
    restart: unless-stopped
    networks:
      - laboflow

  nginx:
    image: ${REGISTRY:-crpi-oxztsn6qggvtnlnf.cn-guangzhou.personal.cr.aliyuncs.com/laboflow}/docker-nginx:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-3008}:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - clawith-frontend
      - clawith-backend
      - aippt
    networks:
      - laboflow
      - ragflow  # must reach ragflow-cpu on its own network

volumes:
  pgdata:
  redisdata:
  agent_data:

networks:
  laboflow:
    driver: bridge
  # ragflow network is declared in ragflow/docker/docker-compose-base.yml (via include);
  # referenced here so nginx can join it and reach ragflow-cpu by service name
  ragflow: {}
