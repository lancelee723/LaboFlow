server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Keep /ppt prefix externally, then rewrite to static root internally.
    location = /ppt {
        return 301 /ppt/;
    }

    location /ppt/ {
        rewrite ^/ppt/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # Optional direct root access for local debug.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
